services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-careerlens}
      POSTGRES_USER: ${POSTGRES_USER:-careerlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-careerlens_local}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schemas:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-careerlens} -d ${POSTGRES_DB:-careerlens}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      AI_SERVICE_URL: http://ai-service:8100
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started

  ai-service:
    build:
      context: ./ai-service
    env_file:
      - .env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    ports:
      - "${AI_SERVICE_PORT:-8100}:8100"
    depends_on:
      - chroma

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:
